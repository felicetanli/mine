<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Bamboo Snack</title>
    <style>
        :root {
            --forest-green: #2d5a27;
            --bamboo-light: #a8dadc;
            --panda-white: #ffffff;
            --panda-black: #2d3436;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f2f1;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Forest */
        .forest {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1;
        }

        .bamboo-stalk {
            width: 20px;
            height: 80%;
            background: linear-gradient(to right, #7cb342, #9ccc65);
            border-radius: 5px;
            position: relative;
            opacity: 0.8;
        }

        /* The Panda Container */
        .panda-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Panda Head */
        .head {
            width: 150px;
            height: 130px;
            background: var(--panda-white);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ear {
            width: 45px;
            height: 45px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: -10px;
        }
        .ear.left { left: 0; }
        .ear.right { right: 0; }

        .eye-patch {
            width: 45px;
            height: 55px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: 40px;
            transform: rotate(15deg);
        }
        .eye-patch.left { left: 25px; transform: rotate(-15deg); }
        .eye-patch.right { right: 25px; }

        .eye-white {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 15px;
        }

        .nose {
            width: 18px;
            height: 12px;
            background: #444;
            border-radius: 50%;
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* The Snack (Bamboo) */
        .snack-bamboo {
            width: 100px;
            height: 12px;
            background: #8bc34a;
            border-radius: 10px;
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 15;
            transform: rotate(-10deg);
            animation: munch 1s infinite ease-in-out;
        }

        /* Animations */
        @keyframes munch {
            0%, 100% { transform: rotate(-10deg) translateX(0); }
            50% { transform: rotate(-15deg) translateX(5px); }
        }

        .mouth {
            width: 20px;
            height: 10px;
            border-bottom: 3px solid #444;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: chew 0.5s infinite;
        }

        @keyframes chew {
            0%, 100% { height: 5px; }
            50% { height: 10px; }
        }

        .caption {
            margin-top: 20px;
            color: var(--forest-green);
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="forest">
        <div class="bamboo-stalk"></div>
        <div class="bamboo-stalk" style="height: 90%;"></div>
        <div class="bamboo-stalk" style="height: 75%;"></div>
        <div class="bamboo-stalk"></div>
        <div class="bamboo-stalk" style="height: 85%;"></div>
    </div>

    <div class="panda-container">
        <div class="head">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye-patch left"><div class="eye-white"></div></div>
            <div class="eye-patch right"><div class="eye-white"></div></div>
            <div class="nose"></div>
            <div class="mouth"></div>
            <div class="snack-bamboo"></div>
        </div>
        <div class="caption">Nom nom nom...</div>
    </div>

</body>
</html>
