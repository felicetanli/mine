<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Bamboo Forest</title>
    <style>
        :root {
            --forest-green: #2d5a27;
            --bamboo-light: #9ccc65;
            --panda-white: #ffffff;
            --panda-black: #2d3436;
            --accent-color: #8bc34a;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f2f1;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- Profile Picture Section --- */
        .profile-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-out;
        }

        .me-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            object-fit: cover;
            background-color: #ccc; /* Fallback color */
        }

        .profile-label {
            margin-top: 8px;
            font-size: 0.85rem;
            background: var(--forest-green);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- The Bamboo Forest --- */
        .forest {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1;
        }

        .bamboo-stalk {
            width: 25px;
            height: 85%;
            background: linear-gradient(to right, #7cb342, #9ccc65);
            border-radius: 8px;
            position: relative;
            opacity: 0.7;
        }

        /* --- The Panda --- */
        .panda-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 3s infinite ease-in-out;
        }

        .head {
            width: 160px;
            height: 140px;
            background: var(--panda-white);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .ear {
            width: 50px;
            height: 50px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: -12px;
        }
        .ear.left { left: -5px; }
        .ear.right { right: -5px; }

        .eye-patch {
            width: 50px;
            height: 60px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: 45px;
        }
        .eye-patch.left { left: 25px; transform: rotate(-15deg); }
        .eye-patch.right { right: 25px; transform: rotate(15deg); }

        .eye-white {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 18px;
        }

        .nose {
            width: 20px;
            height: 14px;
            background: #444;
            border-radius: 50%;
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- The Bamboo Snack --- */
        .snack {
            width: 110px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 10px;
            position: absolute;
            bottom: 25px;
            left: 15px;
            z-index: 15;
            transform: rotate(-12deg);
            border-right: 4px solid #7cb342;
            animation: munch 0.8s infinite ease-in-out;
        }

        .mouth {
            width: 24px;
            height: 12px;
            border-bottom: 3px solid #444;
            border-radius: 0 0 12px 12px;
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- Animations --- */
        @keyframes munch {
            0%, 100% { transform: rotate(-12deg) scale(1); }
            50% { transform: rotate(-18deg) scale(1.05); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .caption {
            margin-top: 25px;
            color: var(--forest-green);
            font-weight: bold;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.8);
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="me.jpeg" alt="Forest Keeper" class="me-photo">
        <div class="profile-label">Forest Keeper</div>
    </div>

    <div class="forest">
        <div class="bamboo-stalk" style="height: 80%;"></div>
        <div class="bamboo-stalk" style="height: 95%;"></div>
        <div class="bamboo-stalk" style="height: 70%;"></div>
        <div class="bamboo-stalk" style="height: 88%;"></div>
        <div class="bamboo-stalk" style="height: 75%;"></div>
        <div class="bamboo-stalk" style="height: 92%;"></div>
    </div>

    <div class="panda-wrapper">
        <div class="head">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye-patch left"><div class="eye-white"></div></div>
            <div class="eye-patch right"><div class="eye-white"></div></div>
            <div class="nose"></div>
            <div class="mouth"></div>
            <div class="snack"></div>
        </div>
        <div class="caption">Nom nom nom... 🎋</div>
    </div>

</body>
</html>
